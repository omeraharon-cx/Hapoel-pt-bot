name: Hapoel Updates Timer

on:
  schedule:
    - cron: '*/15 * * * *' # הרצה כל 15 דקות בדיוק
  workflow_dispatch: # מאפשר לנו להריץ את הבוט ידנית לבדיקה

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # חשוב מאוד: מאפשר לבוט לזכור אילו כתבות הוא כבר שלח
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot.py

      - name: Save history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_links.txt
          git commit -m "Update history" || echo "No changes to commit"
          git push
