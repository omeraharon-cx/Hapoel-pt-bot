name: Hapoel Updates Timer

on:
  schedule:
    - cron: '*/45 * * * *' 
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python bot.py

      - name: Save history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          touch seen_links.txt recent_summaries.txt subscribers.txt task_log.txt
          git add seen_links.txt recent_summaries.txt subscribers.txt task_log.txt
          git commit -m "Update history and tasks [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
          
      - name: Commit and push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update history and task logs [skip ci]"
        file_pattern: 'seen_links.txt task_log.txt recent_summaries.txt'
